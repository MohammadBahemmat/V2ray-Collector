name: Unified Collector (15 min)

on:
  schedule:
    - cron: '*/15 * * * *'   # هر ۱۵ دقیقه اجرا می‌شود
  workflow_dispatch:         # امکان اجرای دستی

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20        # زمان کافی برای اسکن و پردازش
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r config/requirements.txt

      # استفاده از GitHub App برای دریافت توکن پایدارتر
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Run collector
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          RUN_MODE: frequent
          MAX_AGE_HOURS: 0.25  # فقط ۱۵ دقیقه اخیر
        run: python src/collector_git.py

      # پردازش‌های تکمیلی روی فایل اصلی
      - name: Split joined proxy links
        run: |
          if [ -f all_servers.txt ]; then
            python src/split_links.py all_servers.txt
          fi

      - name: Advanced dedup configs
        run: |
          if [ -f all_servers.txt ]; then
            python src/dedup_configs.py all_servers.txt
          fi

      - name: Commit and push updated files
        timeout-minutes: 5
        continue-on-error: true
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          if [ ! -f discovered_branches.json ]; then
            echo '[]' > discovered_branches.json
          fi
          # اضافه کردن all_servers.txt و همه فایل‌های پروتکل‌ها
          git add all_servers.txt *_servers.txt checkpoint.json discovered_branches.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "🔄 Update all servers [skip ci]"
            git pull --rebase --strategy-option ours
            git push
          fi

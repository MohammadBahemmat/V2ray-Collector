name: Unified Collector (15 min, dual token)

on:
  schedule:
    - cron: '*/15 * * * *'   # هر ۱۵ دقیقه (دقایق 0, 15, 30, 45)
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r config/requirements.txt

      - name: Run Telegram Collector
        run: python src/telegram_collector.py
        
      # همیشه توکن اپ را تولید کن (حتی اگر استفاده نشود، اشکالی ندارد)
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Select token based on minute
        id: select-token
        run: |
          MINUTE=$(date +%M)
          if [ "$MINUTE" = "00" ] || [ "$MINUTE" = "15" ]; then
            echo "::set-output name=token::${{ secrets.GH_TOKEN }}"
            echo "Using Classic token for minute $MINUTE"
          else
            echo "::set-output name=token::${{ steps.app-token.outputs.token }}"
            echo "Using GitHub App token for minute $MINUTE"
          fi

      - name: Run collector
        env:
          GITHUB_TOKEN: ${{ steps.select-token.outputs.token }}
          RUN_MODE: frequent
          MAX_AGE_HOURS: 0.25
        run: python src/collector_git.py

      - name: Split joined proxy links
        run: |
          if [ -f all_servers.txt ]; then
            python src/split_links.py all_servers.txt
          fi

      - name: Advanced dedup configs
        run: |
          if [ -f all_servers.txt ]; then
            python src/dedup_configs.py all_servers.txt
          fi

      - name: Commit and push updated files
        timeout-minutes: 5
        continue-on-error: true
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          if [ ! -f discovered_branches.json ]; then
            echo '[]' > discovered_branches.json
          fi
          git add all_servers.txt *_servers.txt checkpoint.json discovered_branches.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "🔄 Update all servers [skip ci]"
            git pull --rebase --strategy-option ours
            git push
          fi

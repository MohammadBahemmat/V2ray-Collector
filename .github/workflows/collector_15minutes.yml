name: Frequent Collector (15 min)

on:
  schedule:
    - cron: '5,20,35,50 * * * *'
  workflow_dispatch:

concurrency:
  group: collector-update
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r config/requirements.txt

      - name: Run frequent collector (no API, no token)
        run: python src/collector_frequent.py

      - name: Split joined proxy links
        run: |
          if [ -f frequent_servers.txt ]; then
            python src/split_links.py frequent_servers.txt
          fi

      - name: Advanced dedup configs
        run: |
          if [ -f frequent_servers.txt ]; then
            python src/dedup_configs.py frequent_servers.txt
          fi

      - name: Merge new configs into daily and hourly files
        run: |
          if [ -f frequent_servers.txt ]; then
            python src/merge_unique.py frequent_servers.txt daily_servers.txt
            python src/merge_unique.py frequent_servers.txt hourly_servers.txt
          else
            echo "No frequent file, skipping merge."
          fi

      - name: Commit and push
        timeout-minutes: 5
        continue-on-error: true
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add frequent_servers.txt daily_servers.txt hourly_servers.txt 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "🔄 Update frequent servers [skip ci]"
            git pull --rebase --strategy-option ours
            git push
          fi

name: Temp Channel Cleaner (commit results)

on:
  workflow_dispatch:

jobs:
  clean:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write          # اجازهٔ commit و push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install requests
        run: pip install requests

      - name: Run cleaner
        run: python src/channel_cleaner.py

      # ثبت فایل‌های جدید در مخزن
      - name: Commit cleaned files
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add data/channels_cleaned.txt data/invalid_channels.txt
          git commit -m "Add cleaned and invalid channel lists" || echo "No changes to commit"
          git pull --rebase --strategy-option ours
          git push

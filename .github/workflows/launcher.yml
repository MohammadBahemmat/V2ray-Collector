name: Launcher (Start Daily Chain)

on:
  schedule:
    - cron: '30 20 * * *'   # ساعت 00:00 تهران (20:30 UTC)
  workflow_dispatch:

jobs:
  trigger-daily:
    runs-on: ubuntu-latest
    steps:
      - name: Wait 15 seconds for environment to settle
        run: sleep 15

      - name: Trigger Daily Collector
        uses: actions/github-script@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'collector_daily.yml',
              ref: 'main'
            });

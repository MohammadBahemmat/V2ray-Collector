name: Frequent Collector (20 min)

on:
  workflow_dispatch:
    inputs:
      run_number:
        description: 'شماره اجرا (1 یا 2)'
        required: false
        default: '1'

concurrency:
  group: collector-update
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r config/requirements.txt

      - name: Wait 20 minutes before starting scan
        run: sleep 1200
        
      # --- تولید توکن GitHub App (باید قبل از Pre-check انجام شود) ---
      - name: Generate a token for the GitHub App
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      # --- پیش‌بررسی Core Rate Limit با توکن App ---
      - name: Pre-check GitHub Core Rate Limit
        id: rate-check
        timeout-minutes: 6
        run: |
          THRESHOLD=2400
          MAX_WAIT=200
          ELAPSED=0
          INTERVAL=10
          TOKEN="${{ steps.app-token.outputs.token }}"

          while [ $ELAPSED -le $MAX_WAIT ]; do
            RESPONSE=$(curl -s -H "Authorization: token $TOKEN" https://api.github.com/rate_limit)
            CORE_REMAINING=$(echo "$RESPONSE" | python -c "import sys,json; print(json.load(sys.stdin)['resources']['core']['remaining'])")
            echo "Core Remaining: $CORE_REMAINING (need at least $THRESHOLD)"

            if [ "$CORE_REMAINING" -ge "$THRESHOLD" ]; then
              echo "✅ Enough Core available. Proceeding with scan."
              exit 0
            fi

            echo "⏳ Low Core. Waiting ${INTERVAL}s... ($ELAPSED/$MAX_WAIT elapsed)"
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          echo "❌ Timeout waiting for Core limit. Exiting gracefully."
          exit 1

      # --- اجرای collector با توکن App ---
      - name: Run frequent collector
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          RUN_MODE: frequent
          MAX_AGE_HOURS: 0.33
        run: python src/collector_git.py

      - name: Split joined proxy links
        run: |
          if [ -f frequent_servers.txt ]; then
            python src/split_links.py frequent_servers.txt
          fi

      - name: Advanced dedup configs
        run: |
          if [ -f frequent_servers.txt ]; then
            python src/dedup_configs.py frequent_servers.txt
          fi

      - name: Commit and push updated files
        timeout-minutes: 5
        continue-on-error: true
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          if [ ! -f discovered_branches.json ]; then
            echo '[]' > discovered_branches.json
          fi
          git add frequent_servers.txt checkpoint.json discovered_branches.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "🔄 Update frequent servers [skip ci]"
            git pull --rebase --strategy-option ours
            git push
          fi

      - name: Upload full file as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frequent_servers.txt-${{ github.run_id }}
          path: frequent_servers.txt
          retention-days: 1

      # --- وقفه ۲۰ دقیقه‌ای و سپس زنجیره‌سازی ---
      - name: Wait 20 minutes before triggering next job
        if: success()
        run: sleep 1200

      - name: Trigger Frequent 2 (if run_number is 1)
        if: success() && github.event.inputs.run_number == '1'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'collector_frequent.yml',
              ref: 'main',
              inputs: {
                run_number: '2'
              }
            });

      - name: Trigger Hourly (if run_number is 2)
        if: success() && github.event.inputs.run_number == '2'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'collector_hourly.yml',
              ref: 'main'
            });

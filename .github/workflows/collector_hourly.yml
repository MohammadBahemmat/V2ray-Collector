name: Hourly Collector (Fast)

on:
  schedule:
    - cron: '0 * * * *'   # هر ساعت رأس دقیقه صفر
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r config/requirements.txt

      - name: Run collector
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          RUN_MODE: hourly
          MAX_AGE_HOURS: 1
        run: python src/collector_git.py

      - name: Split joined proxy links
        run: |
          if [ -f hourly_servers.txt ]; then
            python src/split_links.py hourly_servers.txt
          else
            echo "File hourly_servers.txt not found, skipping split."
          fi

      - name: Advanced dedup configs
        run: |
          if [ -f hourly_servers.txt ]; then
            python src/dedup_configs.py hourly_servers.txt
          else
            echo "File hourly_servers.txt not found, skipping dedup."
          fi

      - name: Clean conflicting untracked files
        run: rm -f checkpoint.json discovered_branches.json

      - name: Commit and push updated files
        timeout-minutes: 5
        continue-on-error: true
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add hourly_servers.txt 2>/dev/null || true
          git add checkpoint.json discovered_branches.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "🔄 Update servers, checkpoint and branches [skip ci]"
            git pull --rebase --strategy-option ours
            git push
          fi

      - name: Upload full file as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hourly_servers.txt-${{ github.run_id }}
          path: hourly_servers.txt
          retention-days: 1

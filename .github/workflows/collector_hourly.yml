name: Hourly Collector (Fast)

on:
  schedule:
    - cron: '0 * * * *'   # هر ساعت رأس دقیقه صفر
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run collector
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python collector_git.py

      - name: Commit and push updated files
        timeout-minutes: 5
        continue-on-error: true
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add servers_collected.txt checkpoint.json discovered_branches.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "🔄 Update servers, checkpoint and branches [skip ci]"
            git pull --rebase --strategy-option ours
            git push
          fi

      - name: Upload full file as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: servers-collected-${{ github.run_id }}
          path: servers_collected.txt
          retention-days: 1

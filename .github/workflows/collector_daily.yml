name: Daily Collector (Full Scan)

on:
  schedule:
    - cron: '0 0 * * *'   # هر روز ساعت 00:00 UTC
  workflow_dispatch:

concurrency:
  group: collector-update
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r config/requirements.txt

      - name: Reset checkpoint for full daily scan
        run: python src/daily_reset.py

      - name: Run collector
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          RUN_MODE: daily
          MAX_AGE_HOURS: 1            # فقط مخازنی که توی ۱ ساعت گذشته push خورده بودن
        run: python src/collector_git.py

      - name: Split joined proxy links
        run: python src/split_links.py daily_servers.txt

      - name: Advanced dedup configs
        run: python src/dedup_configs.py daily_servers.txt

      - name: Commit and push updated files
        timeout-minutes: 5
        continue-on-error: true
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          if [ ! -f discovered_branches.json ]; then
            echo '[]' > discovered_branches.json
          fi
          git add daily_servers.txt checkpoint.json discovered_branches.json raw_urls_cache.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "🔄 Update servers, checkpoint and branches [skip ci]"
            git pull --rebase --strategy-option ours
            git push
          fi

      - name: Upload full file as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily_servers.txt-${{ github.run_id }}
          path: daily_servers.txt
          retention-days: 1

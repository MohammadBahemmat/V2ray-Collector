name: Daily Collector (Full Scan)

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Reset checkpoint for full scan
        run: python daily_reset.py

      - name: Run collector (full scan)
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python collector_git.py

      - name: Commit and push updated results
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: '🌍 Daily full update [skip ci]'
          file_pattern: 'servers_collected.txt'
          commit_user_name: 'GitHub Actions Bot'
          commit_user_email: 'actions@github.com'

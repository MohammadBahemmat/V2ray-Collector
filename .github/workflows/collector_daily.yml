name: Daily Collector (Full Scan)

on:
  workflow_dispatch:   # توسط Launcher یا دستی

concurrency:
  group: collector-update
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r config/requirements.txt

      # --- پیش‌بررسی Core Rate Limit ---
      - name: Pre-check GitHub Core Rate Limit
        id: rate-check
        timeout-minutes: 6
        run: |
          THRESHOLD=2500
          MAX_WAIT=300   # 5 دقیقه
          ELAPSED=0
          INTERVAL=5
          TOKEN="${{ secrets.GH_TOKEN }}"

          while [ $ELAPSED -le $MAX_WAIT ]; do
            RESPONSE=$(curl -s -H "Authorization: token $TOKEN" https://api.github.com/rate_limit)
            CORE_REMAINING=$(echo "$RESPONSE" | python -c "import sys,json; print(json.load(sys.stdin)['resources']['core']['remaining'])")
            echo "Core Remaining: $CORE_REMAINING (need at least $THRESHOLD)"

            if [ "$CORE_REMAINING" -ge "$THRESHOLD" ]; then
              echo "✅ Enough Core available. Proceeding with scan."
              exit 0
            fi

            echo "⏳ Low Core. Waiting ${INTERVAL}s... ($ELAPSED/$MAX_WAIT elapsed)"
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          echo "❌ Timeout waiting for Core limit. Exiting gracefully."
          exit 1

      - name: Reset checkpoint for full daily scan
        run: python src/daily_reset.py

      - name: Run collector
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          RUN_MODE: daily
          MAX_AGE_HOURS: 1
        run: python src/collector_git.py

      - name: Split joined proxy links
        run: python src/split_links.py daily_servers.txt

      - name: Advanced dedup configs
        run: python src/dedup_configs.py daily_servers.txt

      - name: Commit and push updated files
        timeout-minutes: 5
        continue-on-error: true
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          if [ ! -f discovered_branches.json ]; then
            echo '[]' > discovered_branches.json
          fi
          git add daily_servers.txt checkpoint.json discovered_branches.json raw_urls_cache.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "🔄 Update servers, checkpoint and branches [skip ci]"
            git pull --rebase --strategy-option ours
            git push
          fi

      - name: Upload full file as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily_servers.txt-${{ github.run_id }}
          path: daily_servers.txt
          retention-days: 1

      # --- فعال‌سازی خودکار Hourly پس از پایان Daily ---
      - name: Trigger Hourly Collector
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'collector_hourly.yml',
              ref: 'main'
            });
